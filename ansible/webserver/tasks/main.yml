---
# tasks file for webserver
- name: Install Nginx
  apt:
    name: "nginx"
    state: present
  become: yes

- name: Replace Web Page
  ansible.builtin.template:
    src: index.j2
    dest: /var/www/html/index.nginx-debian.html
  become: yes
  notify: "Nginx Reloader"
